apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-flask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp-flask
  template:
    metadata:
      labels:
        app: myapp-flask
    spec:
      containers:
      - name: myapp
        image: myapp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "myapp_db"
        - name: DB_USER
          value: "myapp_user"
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: flask-secret
              key: jwt-secret-key
