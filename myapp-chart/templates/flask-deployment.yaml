apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}-flask
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      containers:
      - name: {{ .Values.app.name }}
        image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
        imagePullPolicy: {{ .Values.app.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.app.containerPort }}
        env:
        - name: DB_HOST
          value: {{ .Values.postgres.serviceName }}
        - name: DB_PORT
          value: "{{ .Values.postgres.port }}"
        - name: DB_NAME
          value: {{ .Values.postgres.database }}
        - name: DB_USER
          value: {{ .Values.postgres.user }}
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgres.serviceName }}-secret
              key: password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.app.name }}-secret
              key: password
