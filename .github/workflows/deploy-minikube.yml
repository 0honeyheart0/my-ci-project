name: CI/CD to localhost on minikube

on:
  push:
    branches: [ main, restored-auth ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t myapp:latest .

      - name: Load image into Minikube
        run: minikube image load myapp:latest

      - name: Restart deployment in Minikube
        run: |
          kubectl rollout restart deployment/myapp-flask
          kubectl rollout status deployment/myapp-flask

      - name: Check pods
        run: kubectl get pods
